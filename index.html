<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>kay via</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="app-container">
  
  <div class="controls-wrapper">
    <button class="btn-action btn-wallpaper" id="changeWallpaperBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-image-fill" viewBox="0 0 16 16">
        <path d="M.002 3a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-12a2 2 0 0 1-2-2zm1 9v1a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9.5l-3.777-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062zm5-6.5a1.5 1.5 0 1 0-3 0 1.5 1.5 0 0 0 3 0"/>
        </svg>
      pki iba po wallpaepr
    </button>

    <div class="sidebar-controls">
      <button class="btn-action btn-add-notif" id="addNotificationBtn">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        dagdag notif pls
      </button>

      <button class="btn-action btn-delete-all" id="deleteAllBtn">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        alis lht notifs tnx
      </button>
    </div>
  </div>

  <div class="iphone-frame" id="screenshotTarget">
    <div class="screen" id="phoneScreen">
      
      <div class="status-bar">
        <svg viewBox="0 0 18 12"><path d="M1 12h3V8H1v4zm5 0h3V5H6v7zm5 0h3V2h-3v10zm5 0h3v-12h-3v12z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M12 21L15.6 16.2C14.6 15.4 13.4 15 12 15C10.6 15 9.4 15.4 8.4 16.2L12 21ZM12 11C9.3 11 6.8 12 4.8 13.6L7.2 16.8C8.6 15.6 10.2 15 12 15C13.8 15 15.4 15.6 16.8 16.8L19.2 13.6C17.2 12 14.7 11 12 11ZM12 7C8.1 7 4.6 8.5 1.8 10.9L4.2 14.1C6.3 12.2 9 11 12 11C15 11 17.7 12.2 19.8 14.1L22.2 10.9C19.4 8.5 15.9 7 12 7Z"/></svg>
        <svg viewBox="0 0 24 12" style="width: 22px;"><rect x="1" y="1" width="20" height="10" rx="3" stroke="white" stroke-width="1" fill="none"/><rect x="3" y="3" width="16" height="6" rx="1.5" fill="white"/><path d="M22 4v4c1 0 1.5-.5 1.5-2S23 4 22 4z" fill="white"/></svg>
      </div>

      <div class="header-content">
        <div class="lock-icon" id="lockToggle">
          <svg id="iconLocked" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M8 0a4 4 0 0 1 4 4v2.05a2.5 2.5 0 0 1 2 2.45v5a2.5 2.5 0 0 1-2.5 2.5h-7A2.5 2.5 0 0 1 2 13.5v-5a2.5 2.5 0 0 1 2-2.45V4a4 4 0 0 1 4-4M4.5 7A1.5 1.5 0 0 0 3 8.5v5A1.5 1.5 0 0 0 4.5 15h7a1.5 1.5 0 0 0 1.5-1.5v-5A1.5 1.5 0 0 0 11.5 7zM8 1a3 3 0 0 0-3 3v2h6V4a3 3 0 0 0-3-3"/>
          </svg>
          <svg id="iconUnlocked" style="display: none;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M12 0a4 4 0 0 1 4 4v2.5h-1V4a3 3 0 1 0-6 0v2h.5A2.5 2.5 0 0 1 12 8.5v5A2.5 2.5 0 0 1 9.5 16h-7A2.5 2.5 0 0 1 0 13.5v-5A2.5 2.5 0 0 1 2.5 6H8V4a4 4 0 0 1 4-4M2.5 7A1.5 1.5 0 0 0 1 8.5v5A1.5 1.5 0 0 0 2.5 15h7a1.5 1.5 0 0 0 1.5-1.5v-5A1.5 1.5 0 0 0 9.5 7z"/>
          </svg>
        </div>
        
        <div class="time" id="timeDisplay">9:41</div>
        <div class="date" id="dateDisplay">Friday, June 7</div>
      </div>

      <div class="notifications-area" id="notificationsList">
          <div class="notification">
              <div class="notification-header">
                  <div class="notification-title-group">
                      <div class="imessage-icon-placeholder notif-app-icon"></div> 
                      <span class="notification-title notif-app-title">MESSAGES</span>
                  </div>
                  <span class="notification-time notif-time">now</span>
              </div>
              <div class="notification-content">
                  <div class="notification-subtitle notif-name">Percy Jackson</div>
                  <span class="notif-message">hi mhal mo p bko..? xD</span>
                  <div class="notification-footer notif-subtext">99+ more messages from Percy</div>
              </div>
          </div>
      </div>

      <div class="bottom-controls">
        <div class="control-btn">
          <svg viewBox="0 0 24 24"><path d="M7 2h10v3l-2 3v12c0 1.1-.9 2-2 2h-2c-1.1 0-2-.9-2-2V8L7 5V2zm2 2v.5l2 3V20h2V7.5l2-3V4H9zm2 6h2v5h-2v-5z"/></svg>
        </div>
        <div class="control-btn">
          <svg viewBox="0 0 24 24"><path d="M4 6h3.2l1.4-2.8h6.8L16.8 6H20c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V8c0-1.1.9-2 2-2zm0 2v12h16V8H4zm8 10c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5zm0-8c-1.7 0-3 1.3-3 3s1.3 3 3 3 3-1.3 3-3-1.3-3-3-3z"/></svg>
        </div>
      </div>
    </div>
  </div>

  <button class="btn-download" id="downloadScreenshotBtn">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 16 16">
      <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
      <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
    </svg>
    pki download napo
  </button>

</div>

<div id="timeModalOverlay" class="modal-overlay">
  <div class="modal-content">
    <h3>Edit Time</h3>
    <input type="time" id="timeInput">
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeModal('timeModalOverlay')">Cancel</button>
      <button class="btn-save" id="saveTimeBtn">Save</button>
    </div>
  </div>
</div>

<div id="dateModalOverlay" class="modal-overlay">
  <div class="modal-content">
    <h3>Edit Date</h3>
    <input type="date" id="dateInput">
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeModal('dateModalOverlay')">Cancel</button>
      <button class="btn-save" id="saveDateBtn">Save</button>
    </div>
  </div>
</div>

<div id="wallpaperModalOverlay" class="modal-overlay">
  <div class="modal-content">
    <h3>pki iba po wallpaepr</h3>
    <div class="form-group">
      <label>Upload Image (PNG/JPG)</label>
      <div class="file-input-wrapper">
        <input type="file" id="wallpaperUploadInput" accept=".png, .jpg, .jpeg">
      </div>
    </div>
    
    <div class="cropper-wrapper" id="cropperWrapper">
      <img id="cropperImage" src="">
    </div>

    <div class="modal-buttons column">
      <div style="display: flex; gap: 10px; width: 100%;">
        <button class="btn-cancel" onclick="closeWallpaperModal()">Cancel</button>
        <button class="btn-save" id="applyWallpaperBtn" style="display: none;">Apply Crop</button> 
      </div>
      <button class="btn-outline" id="resetWallpaperBtn" style="width: 100%; margin-top: 5px;">balik sa default wallpaper haha</button>
    </div>
  </div>
</div>

<div id="notificationModalOverlay" class="modal-overlay">
  <div class="modal-content">
    <h3>Edit Notification</h3>
    
    <div class="form-group">
      <label>App Logo (PNG/JPG)</label>
      <div class="file-input-wrapper">
        <input type="file" id="logoUploadInput" accept=".png, .jpg, .jpeg">
      </div>
    </div>

    <div class="form-group">
      <label>Logos</label>
      <div class="preset-scroller" id="presetLogoContainer">
        <div class="preset-item preset-imessage" data-src="imessage.png"></div>
        <div class="preset-item preset-twitter" data-src="twitter.png"></div>
        <div class="preset-item preset-instagram" data-src="instagram.png"></div>
        <div class="preset-item preset-facebook" data-src="facebook.png"></div>
        <div class="preset-item preset-call" data-src="call.png"></div>
      </div>
    </div>

    <div class="form-group">
      <label>App Name</label>
      <input type="text" id="editNotifAppTitle" placeholder="e.g. MESSAGES">
    </div>

    <div class="form-group">
      <label>Text Customization</label>
      <input type="text" id="editNotifName" placeholder="Sender Name">
      <input type="text" id="editNotifMessage" placeholder="Message Content">
      <input type="text" id="editNotifSubtext" placeholder="Subtext Footer">
      <input type="text" id="editNotifTime" placeholder="Time (e.g. now, 5m ago)">
    </div>

    <div class="modal-buttons">
      <button class="btn-delete" id="deleteNotifBtn">Delete</button>
      <button class="btn-cancel" onclick="closeModal('notificationModalOverlay')">Cancel</button>
      <button class="btn-save" id="saveNotifBtn">Save</button>
    </div>
  </div>
</div>

<script src="main.js"></script>

</body>
</html>
